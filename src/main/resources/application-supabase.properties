# =========================================
# Supabase (PostgreSQL) Production Profile
# =========================================
# Activate with: SPRING_PROFILES_ACTIVE=supabase

spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST:db.ypaqsjflkxkwtsiresvh.supabase.co}:${SUPABASE_PORT:5432}/${SUPABASE_DATABASE:postgres}
spring.datasource.username=${SUPABASE_USERNAME:postgres}
spring.datasource.password=${SUPABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# =========================================
# JWT Configuration - Production (15 min)
# =========================================
app.jwt.expiration=900000
app.jwt.secret=${JWT_SECRET:DefaultSecretForTestingOnly}

# =========================================
# H2 Console - Disabled in Production
# =========================================
spring.h2.console.enabled=false

# =========================================
# CORS - Specific Origins Only
# =========================================
app.cors.allowed-origins=https://tu-dominio.com,https://www.tu-dominio.com

# =========================================
# Actuator - Production
# =========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# =========================================
# Logging - Production
# =========================================
logging.level.com.vetivet=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
