# =========================================
# Supabase (PostgreSQL) - PRODUCTION PROFILE
# =========================================
# Activate with: SPRING_PROFILES_ACTIVE=supabase (via environment variable)

# PostgreSQL Connection Pooler (optimized for Supabase Session Pooler)
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DATABASE}?sslmode=require
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# HikariCP Connection Pool Configuration (CRITICAL for Supabase)
# =========================================
# Maximum connections in pool
spring.datasource.hikari.maximum-pool-size=5
# Minimum idle connections to maintain
spring.datasource.hikari.minimum-idle=1
# Time to wait for connection from pool (30 seconds)
spring.datasource.hikari.connection-timeout=30000
# Idle timeout (10 minutes)
spring.datasource.hikari.idle-timeout=600000
# Maximum lifetime of connection (30 minutes)
spring.datasource.hikari.max-lifetime=1800000
# Test connection before use
spring.datasource.hikari.connection-test-query=SELECT 1
# Name for debugging
spring.datasource.hikari.pool-name=SuabaseHikariPool

# PostgreSQL Dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto: validate only (schema must exist - production safe)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# =========================================
# JWT Configuration - Production (15 min access token)
# CRITICAL: JWT_SECRET MUST be set as environment variable
# =========================================
app.jwt.expiration=${JWT_EXPIRATION:900000}
app.jwt.secret=${JWT_SECRET}

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://mascofriends.vercel.app}

# =========================================
# WhatsApp Configuration
# =========================================
app.whatsapp.number=${WHATSAPP_NUMBER:+51914867621}
app.whatsapp.default-message=${WHATSAPP_DEFAULT_MESSAGE:Hola! Me gustaría agendar una cita para mi mascota.}

# =========================================
# H2 Console - Disabled in Production
# =========================================
spring.h2.console.enabled=false

# =========================================
# Actuator - Production
# =========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# =========================================
# Logging - Production
# =========================================
logging.level.com.vetivet=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
