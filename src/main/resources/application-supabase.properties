# =========================================
# Supabase (PostgreSQL) - PRODUCTION PROFILE
# =========================================
# Activate with: SPRING_PROFILE_ACTIVE=supabase (via environment variable)

# PostgreSQL Connection Pooler (optimized for Railway)
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DATABASE}
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL Dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto: validate only (schema must exist)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# =========================================
# JWT Configuration - Production (15 min access token)
# =========================================
app.jwt.expiration=${JWT_EXPIRATION:900000}
app.jwt.secret=${JWT_SECRET:ChangeMe_SuperSecretKey}

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://mascofriends.vercel.app}

# =========================================
# WhatsApp Configuration
# =========================================
app.whatsapp.number=${WHATSAPP_NUMBER:+51914867621}
app.whatsapp.default-message=${WHATSAPP_DEFAULT_MESSAGE:Hola! Me gustaría agendar una cita para mi mascota.}

# =========================================
# H2 Console - Disabled in Production
# =========================================
spring.h2.console.enabled=false

# =========================================
# CORS - Specific Origins Only
# =========================================
app.cors.allowed-origins=https://tu-dominio.com,https://www.tu-dominio.com

# =========================================
# Actuator - Production
# =========================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# =========================================
# Logging - Production
# =========================================
logging.level.com.vetivet=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
