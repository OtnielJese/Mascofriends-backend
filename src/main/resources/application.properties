# =========================================
# Vetivet - Application Configuration
# PRODUCTION READY - SUPABASE ONLY
# =========================================

# HARDCODED: Always use supabase profile (production configuration only)
spring.profiles.active=supabase

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Application name
spring.application.name=vetivet-backend

# =========================================
# JPA / Hibernate Configuration
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# Logging
# =========================================
logging.level.root=INFO
logging.level.com.vetivet=DEBUG
logging.level.org.springframework.security=DEBUG
