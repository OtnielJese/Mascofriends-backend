# =========================================
# Vetivet - Application Configuration
# =========================================

# Active profile: local | azure | supabase
spring.profiles.active=${SPRING_PROFILE:local}

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Application name
spring.application.name=vetivet-backend

# =========================================
# LOCAL DEV - H2 In-Memory Database
# =========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:vetivetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# JWT Configuration
# =========================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}

# =========================================
# WhatsApp Configuration
# =========================================
app.whatsapp.number=${WHATSAPP_NUMBER}
app.whatsapp.message=${WHATSAPP_DEFAULT_MESSAGE:Hola! Me gustaría agendar una cita para mi mascota.}

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =========================================
# Actuator
# =========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# =========================================
# Logging
# =========================================
logging.level.com.vetivet=INFO
logging.level.org.springframework.security=WARN
