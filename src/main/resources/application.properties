# =========================================
# Vetivet - Application Configuration
# PRODUCTION READY - SUPABASE ONLY
# =========================================

# HARDCODED: Always use supabase profile (production configuration only)
spring.profiles.active=supabase

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Application name
spring.application.name=vetivet-backend

# =========================================
# Database Configuration (from profile)
# DO NOT configure datasource here - use application-supabase.properties
# =========================================

# =========================================
# JPA / Hibernate Configuration
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# Logging
# =========================================
logging.level.root=INFO
logging.level.com.vetivet=DEBUG
logging.level.org.springframework.security=DEBUG

# =========================================
# JWT Configuration
# =========================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.refresh-token.expiration=${REFRESH_TOKEN_EXPIRATION:604800000}

# =========================================
# WhatsApp Configuration
# =========================================
app.whatsapp.number=${WHATSAPP_NUMBER}
app.whatsapp.message=${WHATSAPP_DEFAULT_MESSAGE:Hola! Me gustaría agendar una cita para mi mascota.}

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =========================================
# Actuator - DEVELOPMENT ONLY
# =========================================
# Only expose health in development (info should not be public)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true

# =========================================
# Logging
# =========================================
logging.level.com.vetivet=INFO
logging.level.org.springframework.security=WARN
